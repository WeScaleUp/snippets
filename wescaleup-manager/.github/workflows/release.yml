name: Release ZIP

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maak plugin ZIP
        run: |
          mkdir -p build
          zip -r build/wescaleup-manager.zip wescaleup-manager/ --exclude "*.DS_Store"

      - name: Upload ZIP als release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/wescaleup-manager.zip
