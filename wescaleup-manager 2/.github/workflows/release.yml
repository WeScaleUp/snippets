name: Build plugin ZIP bij release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: wescaleup-manager

      - name: Maak plugin ZIP
        run: |
          zip -r wescaleup-manager.zip wescaleup-manager/ \
            --exclude "wescaleup-manager/.git/*" \
            --exclude "wescaleup-manager/.github/*" \
            --exclude "wescaleup-manager/*.DS_Store" \
            --exclude "wescaleup-manager/README.md"

      - name: Upload ZIP als release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wescaleup-manager.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
